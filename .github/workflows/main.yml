name: BDC Daily Vocab

on:
  schedule:
    # 避开整点，UTC 22:15 对应 北京时间 06:15
    - cron: '15 22 * * *'
  workflow_dispatch: # 保留手动触发按钮

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许 Action 推送进度更新到仓库
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          pip install eng-to-ipa
          # 如果以后有更多依赖，可以写在这里

      - name: Run Vocabulary Script
        env:
          SENDER_EMAIL: ${{ secrets.EMAIL_SENDER }}
          SENDER_PWD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.EMAIL_RECEIVER }}
        run: python BDC/main.py

      - name: Commit and Push Progress
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add BDC/progress.txt BDC/last_words.txt
          # 仅在有变化时提交，防止报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "📈 自动更新背词进度 [skip ci]" && git push)